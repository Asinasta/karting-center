name: apex_client
description: Flutter client MVP for Apex karting center.
publish_to: "none"
version: 0.1.0+1

environment:
  # go_router 17.x requires Dart 3.9+ (Flutter 3.32+).
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
