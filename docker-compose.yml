services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  web:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
