openapi: 3.1.0
info:
  title: Apex Bookings Models
  version: 0.1.0
components:
  schemas:
    GearChoice:
      type: string
      enum: [own, rental]
    Booking:
      type: object
      required: [id, slot, seats_count, rental_count, seat_gear, price_total, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        slot:
          $ref: '#/components/schemas/BookingSlotSnapshot'
        seats_count:
          type: integer
          minimum: 1
          maximum: 14
          description: Number of seats in the booking. Upper bound follows experienced track capacity_cap (R-013).
        rental_count:
          type: integer
          minimum: 0
          maximum: 14
          description: Number of rented gear sets. Must equal count of `rental` in seat_gear.
        seat_gear:
          type: array
          minItems: 1
          maxItems: 14
          description: Gear choice for each booked seat. Array length is the source for seats_count (R-013).
          items:
            $ref: '#/components/schemas/GearChoice'
        price_total:
          $ref: '../common/models.yaml#/components/schemas/Money'
        status:
          type: string
          enum: [active, cancelled, late_cancel, cancelled_by_center, completed]
        created_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
        cancel_reason:
          type: string
    BookingSlotSnapshot:
      type: object
      required: [id, track_config, marshal, start_at, price, rental_price, meeting_point, status]
      description: Snapshot of slot fields stored with the booking. Status and cancel_reason may be refreshed if the center cancels the slot.
      properties:
        id:
          type: string
          format: uuid
        track_config:
          $ref: '../slots/models.yaml#/components/schemas/TrackConfig'
        marshal:
          $ref: '../marshals/models.yaml#/components/schemas/Marshal'
        start_at:
          type: string
          format: date-time
        price:
          $ref: '../common/models.yaml#/components/schemas/Money'
        rental_price:
          $ref: '../common/models.yaml#/components/schemas/Money'
        meeting_point:
          type: string
        meeting_point_lat:
          type: number
          minimum: -90
          maximum: 90
        meeting_point_lng:
          type: number
          minimum: -180
          maximum: 180
        geometry:
          type: array
          items:
            type: array
            items:
              type: number
        status:
          type: string
          enum: [scheduled, cancelled]
        cancel_reason:
          type: string
    CreateBookingRequest:
      type: object
      required: [slot_id, seat_gear]
      properties:
        slot_id:
          type: string
          format: uuid
        seat_gear:
          type: array
          minItems: 1
          maxItems: 14
          description: Gear choice for each booked seat. The server derives seats_count from array length (R-013).
          items:
            $ref: '#/components/schemas/GearChoice'
