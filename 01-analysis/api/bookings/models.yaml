openapi: 3.1.0
info:
  title: Apex Bookings Models
  version: 0.1.0
components:
  schemas:
    GearChoice:
      type: string
      enum: [own, rental]
    Booking:
      type: object
      required: [id, slot, seats_count, rental_count, seat_gear, price_total, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        slot:
          $ref: '../slots/models.yaml#/components/schemas/Slot'
        seats_count:
          type: integer
          minimum: 1
          maximum: 3
          description: Number of seats in the booking. Maximum 3 is an MVP assumption (R-013).
        rental_count:
          type: integer
          minimum: 0
          maximum: 3
          description: Number of rented gear sets. Maximum 3 follows the booking seat limit assumption (R-013).
        seat_gear:
          type: array
          minItems: 1
          maxItems: 3
          description: Gear choice for each booked seat. Array length is the source for seats_count; maxItems 3 is an MVP assumption (R-013).
          items:
            $ref: '#/components/schemas/GearChoice'
        price_total:
          $ref: '../common/models.yaml#/components/schemas/Money'
        status:
          type: string
          enum: [active, cancelled, late_cancel, cancelled_by_center, completed]
        created_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
        cancel_reason:
          type: string
    CreateBookingRequest:
      type: object
      required: [slot_id, seat_gear]
      properties:
        slot_id:
          type: string
          format: uuid
        seat_gear:
          type: array
          minItems: 1
          maxItems: 3
          description: Gear choice for each booked seat. The server derives seats_count from array length; maxItems 3 is an MVP assumption (R-013).
          items:
            $ref: '#/components/schemas/GearChoice'
