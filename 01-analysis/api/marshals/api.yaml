openapi: 3.1.0
info:
  title: Apex Marshals API
  version: 0.1.0
paths:
  /marshals:
    get:
      operationId: listMarshals
      summary: List marshals for filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Marshals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './models.yaml#/components/schemas/Marshal'
components:
  securitySchemes:
    bearerAuth:
      $ref: '../common/models.yaml#/components/securitySchemes/bearerAuth'
