openapi: 3.1.0
info:
  title: Apex Profile API
  version: 0.1.0
paths:
  /profile:
    get:
      operationId: getProfile
      summary: Get my profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Profile'
    patch:
      operationId: updateProfile
      summary: Update my profile name
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Profile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
    delete:
      operationId: deleteAccount
      summary: Delete account
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account deleted
        '409':
          description: Account has booking state that cannot be processed immediately
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
  /profile/phone-change/otp:
    post:
      operationId: sendPhoneChangeOtp
      summary: Send OTP to a new phone number
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/PhoneChangeOtpRequest'
      responses:
        '204':
          description: OTP sent to new phone
        '409':
          description: Phone already used
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
        '429':
          description: Rate limit
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../common/models.yaml#/components/schemas/Error'
                  - $ref: '../common/models.yaml#/components/schemas/RetryAfter'
  /profile/phone-change/verify:
    post:
      operationId: verifyPhoneChange
      summary: Verify OTP and update profile phone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/VerifyPhoneChangeRequest'
      responses:
        '200':
          description: Updated profile with new phone
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Profile'
        '400':
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
        '409':
          description: Phone already used
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
        '429':
          description: Rate limit or too many attempts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../common/models.yaml#/components/schemas/Error'
                  - $ref: '../common/models.yaml#/components/schemas/RetryAfter'
  /profile/push-token:
    post:
      operationId: registerPushToken
      summary: Register push token from Flutter app
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/PushTokenRequest'
      responses:
        '204':
          description: Token registered
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      $ref: '../common/models.yaml#/components/securitySchemes/bearerAuth'
