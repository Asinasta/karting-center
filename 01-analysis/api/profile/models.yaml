openapi: 3.1.0
info:
  title: Apex Profile Models
  version: 0.1.0
components:
  schemas:
    Profile:
      type: object
      required: [id, name, phone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
        phone:
          type: string
          pattern: '^\\+[1-9]\\d{7,14}$'
        completed_rides_count:
          type: integer
          minimum: 0
          default: 0
        loyalty_tier:
          type: string
          enum: [regular, vip]
          description: Omitted when the client has no loyalty tier yet.
        loyalty_discount_percent:
          type: integer
          minimum: 1
          maximum: 100
          description: Active booking discount percent for the current tier.
    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
    PhoneChangeOtpRequest:
      type: object
      required: [new_phone]
      properties:
        new_phone:
          type: string
          pattern: '^\\+[1-9]\\d{7,14}$'
    VerifyPhoneChangeRequest:
      type: object
      required: [new_phone, code]
      properties:
        new_phone:
          type: string
          pattern: '^\\+[1-9]\\d{7,14}$'
        code:
          type: string
          minLength: 4
          maxLength: 8
    PushTokenRequest:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 4096
        platform:
          type: string
          enum: [ios, android]
        device_id:
          type: string
          description: Stable app-generated device identifier for token upsert and logout cleanup.
