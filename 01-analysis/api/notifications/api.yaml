openapi: 3.1.0
info:
  title: Apex Notifications API
  version: 0.1.0
paths:
  /notifications:
    get:
      operationId: listNotifications
      summary: Pending in-app / push notifications for the current client
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending notifications
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/NotificationList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      $ref: '../common/models.yaml#/components/securitySchemes/bearerAuth'
