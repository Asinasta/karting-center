openapi: 3.1.0
info:
  title: Apex Auth Models
  version: 0.1.0
components:
  schemas:
    SendOtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\\+[1-9]\\d{7,14}$'
    VerifyOtpRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\\+[1-9]\\d{7,14}$'
        code:
          type: string
          minLength: 4
          maxLength: 8
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: Required for a new client
    TokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          minimum: 1
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
